<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>US Trip — May–June 2026</title>
  <link rel="stylesheet" href="../styles/styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>

  <header class="site-header">
    <div class="inner">
      <div class="brand">
        <span class="brand-title">🇺🇸 US Trip</span>
        <span class="brand-dates">May – June 2026</span>
      </div>
      <nav id="cityNav" class="city-nav"></nav>
    </div>
  </header>

  <main class="container">

    <!-- Itinerary section -->
    <section class="section">
      <div class="view-toggle">
        <button class="view-btn active" data-view="overview">🗺️ Overview</button>
        <button class="view-btn" data-view="list">📅 Day by Day</button>
      </div>
      <div id="overview-grid" class="overview-grid"></div>
      <div id="days-list" class="days-list hidden"></div>
    </section>

  </main>

  <!-- Image modal -->
  <div id="imageModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" id="imageModalBackdrop"></div>
    <div class="modal-box">
      <button class="modal-close" id="imageModalClose">✕</button>
      <img id="modalImg" src="" alt="" />
      <p id="modalCaption" class="modal-caption"></p>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../scripts/app.js"></script>
</body>
</html>
